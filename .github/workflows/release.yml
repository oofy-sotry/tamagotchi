name: Build & Release

# v* 태그가 푸시될 때 실행 (예: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 맥 빌드 ────────────────────────────────────────────────
  build-macos:
    name: Build 맥 (Universal)
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false  # 코드 사이닝 스킵 (ad-hoc 자동 처리)
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Electron 바이너리 캐시
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-mac-${{ hashFiles('package-lock.json') }}

      - name: 패키지 설치
        run: npm ci

      - name: 맥 앱 빌드 (Universal)
        run: npm run build:mac

      - name: 빌드 결과 확인
        run: ls -lh dist/

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/*.dmg
            dist/*.zip

  # ── 윈도우 빌드 ─────────────────────────────────────────────
  build-windows:
    name: Build 윈도우
    runs-on: windows-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Electron 바이너리 캐시
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\electron\Cache
          key: electron-win-${{ hashFiles('package-lock.json') }}

      - name: 패키지 설치
        run: npm ci

      - name: 윈도우 앱 빌드
        run: npm run build:win

      - name: 빌드 결과 확인
        run: dir dist\

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe

  # ── GitHub Release 생성 ─────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 맥 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./mac

      - name: 윈도우 빌드 다운로드
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: ./win

      - name: 빌드 파일 목록 확인
        run: |
          echo "=== macOS ===" && ls -lh mac/
          echo "=== Windows ===" && ls -lh win/

      - name: GitHub Release 생성 및 파일 첨부
        uses: softprops/action-gh-release@v2
        with:
          name: "다마고치 ${{ github.ref_name }}"
          body: |
            ## 다마고치 ${{ github.ref_name }}

            ### 다운로드

            | 파일 | 대상 | 설명 |
            |------|------|------|
            | `.dmg` | 맥 사용자 | Apple Silicon + Intel 통합 |
            | `.zip` | 맥 사용자 | .app 직접 압축 |
            | `.exe` | 윈도우 사용자 | 설치 프로그램 |

            ### 맥 설치
            1. `.dmg` 다운로드 후 열기
            2. 앱을 Applications 폴더로 드래그
            3. 처음 실행 시 **우클릭 → 열기** (보안 경고 우회)

            ### 윈도우 설치
            1. `.exe` 다운로드 후 실행
            2. 설치 완료 후 바탕화면 아이콘으로 실행
          files: |
            mac/*.dmg
            mac/*.zip
            win/*.exe
          draft: false
          prerelease: false
