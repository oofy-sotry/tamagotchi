<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다마고치</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 캐릭터 선택 화면 -->
  <div id="char-select" class="char-select hidden">
    <div class="char-select-title">캐릭터를 선택하세요</div>
    <div class="char-select-options">
      <div class="char-option" data-type="dragon">
        <canvas class="char-preview" id="preview-dragon"></canvas>
        <div class="char-name">🐉 용</div>
        <div class="char-desc">불꽃의 용</div>
      </div>
      <div class="char-option" data-type="fire_lizard">
        <canvas class="char-preview" id="preview-fire_lizard"></canvas>
        <div class="char-name">🦎 불도마뱀</div>
        <div class="char-desc">화염의 도마뱀</div>
      </div>
      <div class="char-option" data-type="water_turtle">
        <canvas class="char-preview" id="preview-water_turtle"></canvas>
        <div class="char-name">🐢 물거북</div>
        <div class="char-desc">바다의 거북</div>
      </div>
    </div>
  </div>

  <!-- 캐릭터 -->
  <div id="pet-container">
    <!-- 알림 말풍선 (컨테이너 기준) -->
    <div id="notification" class="notification hidden"></div>

    <!-- 상태 표시 (컨테이너 기준, 호버 시 표시) -->
    <div id="status-panel" class="status-panel hidden">
      <div class="gauge">
        <span>🍖</span>
        <div class="gauge-bar"><div class="gauge-fill hunger" id="hunger-bar"></div></div>
      </div>
      <div class="gauge">
        <span>😊</span>
        <div class="gauge-bar"><div class="gauge-fill happiness" id="happiness-bar"></div></div>
      </div>
      <div class="gauge">
        <span>❤️</span>
        <div class="gauge-bar"><div class="gauge-fill health" id="health-bar"></div></div>
      </div>
      <div class="gauge">
        <span>🧼</span>
        <div class="gauge-bar"><div class="gauge-fill cleanliness" id="cleanliness-bar"></div></div>
      </div>
      <div class="gauge">
        <span>💤</span>
        <div class="gauge-bar"><div class="gauge-fill energy" id="energy-bar"></div></div>
      </div>
      <div class="gauge">
        <span>⭐</span>
        <div class="gauge-bar"><div class="gauge-fill exp" id="exp-bar"></div></div>
        <span class="gauge-label" id="level-label">Lv.1</span>
      </div>
      <div class="status-info">
        <span id="stage-label">알</span> · <span id="age-label">0일</span>
      </div>
      <div class="status-parents hidden" id="parents-info"></div>
      <div class="status-combat">
        <span id="grade-label" class="grade-badge"></span>
        <span>⚔️ <span id="power-label">0</span></span>
        <span>💰 <span id="coin-label">0</span></span>
      </div>
    </div>

    <div id="pet" class="pet">
      <canvas id="pet-canvas"></canvas>
    </div>
    <div id="pet-name" class="pet-name"></div>
  </div>


  <!-- 똥 -->
  <div id="poop-container"></div>

  <!-- 상점 오버레이 -->
  <div id="shop-panel" class="shop-panel hidden">
    <div class="shop-header">
      <span class="shop-title">💰 상점</span>
      <span class="shop-coins">코인: <span id="shop-coin-display">0</span></span>
      <button class="shop-close" id="shop-close">✕</button>
    </div>
    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="consumable">⚗️ 물약</button>
      <button class="shop-tab" data-tab="weapon">⚔️ 무기</button>
      <button class="shop-tab" data-tab="accessory">🛡️ 악세사리</button>
    </div>
    <div class="shop-items" id="shop-items"></div>
  </div>

  <!-- 사망 화면 -->
  <div id="death-screen" class="death-screen hidden">
    <div class="death-message">
      <p>💀</p>
      <p id="death-msg">떠났어요...</p>
      <p id="death-cause" style="font-size:11px;color:#999;margin-top:4px;"></p>
      <button id="revive-btn">다시 시작</button>
    </div>
  </div>

  <script src="game.js"></script>
  <script src="sprites.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
