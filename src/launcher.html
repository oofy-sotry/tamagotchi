<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>다마고치 - 펫 관리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: rgba(255,255,255,0.97);
      border-radius: 16px;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 타이틀바 (드래그 영역) */
    .titlebar {
      -webkit-app-region: drag;
      padding: 14px 16px 8px;
      font-size: 15px;
      font-weight: bold;
      color: #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .titlebar-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .titlebar-btn:hover { opacity: 1; }

    /* 펫 목록 */
    .pet-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
    }

    .pet-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 6px;
    }
    .pet-card:hover { background: rgba(0,0,0,0.04); }
    .pet-card.is-open { opacity: 0.5; cursor: default; }
    .pet-card.is-dead { opacity: 0.4; }

    /* 탭 */
    .launcher-tabs {
      display: flex;
      padding: 0 16px;
      gap: 0;
      border-bottom: 1px solid #eee;
    }
    .launcher-tab {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      color: #999;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .launcher-tab.active { color: #ff6600; border-bottom-color: #ff6600; }
    .launcher-tab:hover:not(.active) { color: #666; }
    .tab-count {
      display: inline-block;
      background: #eee;
      color: #888;
      font-size: 10px;
      font-weight: bold;
      border-radius: 8px;
      padding: 1px 5px;
      margin-left: 3px;
      vertical-align: middle;
    }
    .launcher-tab.active .tab-count { background: #ffe0cc; color: #cc4400; }

    /* 묘지 카드 */
    .grave-card {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: rgba(0,0,0,0.02);
    }
    .grave-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .grave-icon { font-size: 18px; }
    .grave-name { font-size: 13px; font-weight: bold; color: #555; }
    .grave-age { font-size: 11px; color: #999; }
    .grave-detail { font-size: 10px; color: #888; line-height: 1.6; }
    .grave-cause {
      font-size: 11px;
      color: #c0392b;
      font-weight: bold;
      margin-top: 2px;
    }
    .grave-delete {
      background: none; border: none; font-size: 12px;
      cursor: pointer; opacity: 0.3; padding: 2px;
      margin-left: auto;
    }
    .grave-delete:hover { opacity: 1; }

    .pet-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .pet-card-info { flex: 1; }
    .pet-card-name { font-size: 13px; font-weight: bold; color: #333; }
    .pet-card-detail { font-size: 11px; color: #888; margin-top: 2px; }
    .pet-card-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 8px;
      background: #eee;
      color: #666;
    }
    .pet-card-badge.open { background: #d4edda; color: #155724; }
    .pet-card-badge.dead { background: #f8d7da; color: #721c24; }

    .pet-card-delete {
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 4px;
    }
    .pet-card:hover .pet-card-delete { opacity: 0.4; }
    .pet-card-delete:hover { opacity: 1 !important; }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 13px;
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

    /* 투명도 슬라이더 영역 */
    .opacity-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px 4px;
      flex-shrink: 0;
      border-top: 1px solid #eee;
    }
    .opacity-bar label {
      font-size: 12px;
      color: #888;
      white-space: nowrap;
    }
    .opacity-bar input[type=range] {
      flex: 1;
      accent-color: #ff6600;
      height: 4px;
      cursor: pointer;
    }
    .opacity-bar span {
      font-size: 12px;
      color: #555;
      min-width: 34px;
      text-align: right;
    }

    /* 새 펫 버튼 영역 */
    .bottom-bar {
      padding: 6px 16px 12px;
      flex-shrink: 0;
    }
    .bulk-btns {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .bulk-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    .bulk-btn.start { background: #e8f5e9; color: #2e7d32; }
    .bulk-btn.start:hover { background: #c8e6c9; }
    .bulk-btn.stop { background: #fce4ec; color: #c62828; }
    .bulk-btn.stop:hover { background: #f8bbd0; }
    .bulk-btn.care-on { background: #e3f2fd; color: #1565c0; }
    .bulk-btn.care-on:hover { background: #bbdefb; }
    .bulk-btn.care-off { background: #fff3e0; color: #e65100; }
    .bulk-btn.care-off:hover { background: #ffe0b2; }

    .new-pet-btn {
      width: 100%;
      padding: 10px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .new-pet-btn:hover { background: #cc4400; }

    /* 이름 입력 오버레이 */
    .name-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .name-overlay.hidden { display: none; }
    .name-box {
      text-align: center;
      padding: 20px;
    }
    .name-box-title { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 12px; }
    .name-box input {
      width: 180px;
      padding: 8px 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      outline: none;
    }
    .name-box input:focus { border-color: #ff8833; }
    .name-box-error { font-size: 11px; color: #e33; margin-top: 6px; min-height: 16px; }
    .name-box-buttons { margin-top: 10px; display: flex; gap: 8px; justify-content: center; }
    .name-box-buttons button {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-confirm { background: #ff6600; color: white; }
    .btn-confirm:hover { background: #cc4400; }
    .btn-cancel { background: #eee; color: #666; }
    .btn-cancel:hover { background: #ddd; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span>🐾 내 펫들</span>
    <div style="display:flex;gap:14px;">
      <button class="titlebar-btn" id="minimize-btn">−</button>
      <button class="titlebar-btn" id="close-btn">✕</button>
    </div>
  </div>

  <div class="launcher-tabs">
    <button class="launcher-tab active" id="tab-alive">🐾 살아있는 펫 <span class="tab-count" id="count-alive"></span></button>
    <button class="launcher-tab" id="tab-grave">🪦 묘 <span class="tab-count" id="count-grave"></span></button>
  </div>

  <div class="pet-list" id="pet-list"></div>
  <div class="pet-list hidden" id="grave-list"></div>

  <div class="opacity-bar" id="opacity-bar">
    <label for="global-opacity">👁 투명도</label>
    <input type="range" id="global-opacity" min="10" max="100" value="100" step="10">
    <span id="global-opacity-value">100%</span>
  </div>

  <div class="bottom-bar" id="bottom-bar">
    <div class="bulk-btns">
      <button class="bulk-btn start" id="start-all-btn">▶ 전체 시작</button>
      <button class="bulk-btn stop" id="stop-all-btn">■ 전체 종료</button>
    </div>
    <div class="bulk-btns">
      <button class="bulk-btn care-on" id="autocare-on-btn">🤖 자동돌봄 ON</button>
      <button class="bulk-btn care-off" id="autocare-off-btn">🤖 자동돌봄 OFF</button>
    </div>
    <button class="new-pet-btn" id="new-pet-btn"><span>+</span> 새 펫 만들기</button>
  </div>

  <!-- 이름 입력 오버레이 -->
  <div class="name-overlay hidden" id="name-overlay">
    <div class="name-box">
      <div class="name-box-title">새 펫의 이름을 입력하세요</div>
      <input type="text" id="new-name-input" maxlength="10" placeholder="이름 입력...">
      <div class="name-box-error" id="name-error"></div>
      <div class="name-box-buttons">
        <button class="btn-cancel" id="name-cancel">취소</button>
        <button class="btn-confirm" id="name-confirm">만들기</button>
      </div>
    </div>
  </div>

  <script src="launcher.js"></script>
</body>
</html>
